<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ sala_nome }} — Projetor</title>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            cursor: none !important;
        }
        *, a, button, input, video, div, span, p, h1, h2, h3, img {
            cursor: none !important;
        }

        /* ─── Waiting Screen - fundo SÓLIDO (sem gradiente, sem flicker no Mali) ─── */
        #waiting {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000d1a;
            z-index: 10;
        }
        #waiting.hidden {
            display: none;
        }

        .waiting-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-projetor {
            margin-bottom: clamp(12px, 2vh, 28px);
        }
        .logo-projetor img {
            width: clamp(48px, 6vw, 80px);
            height: auto;
            filter: brightness(0) invert(1);
            opacity: 0.5;
        }

        .sala-tag {
            font-size: clamp(10px, 1.2vw, 16px);
            color: rgba(255,255,255,0.2);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .sala-nome-display {
            font-size: clamp(28px, 5vw, 64px);
            font-weight: 300;
            color: rgba(255,255,255,0.85);
            letter-spacing: 2px;
            margin-bottom: clamp(16px, 3vh, 40px);
        }

        .status-text-main {
            font-size: clamp(22px, 3.5vw, 48px);
            font-weight: 200;
            color: rgba(255,255,255,0.7);
            letter-spacing: 4px;
        }

        .indicator {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: clamp(12px, 2vh, 28px);
            padding: clamp(6px, 1vh, 10px) clamp(20px, 3vw, 32px);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 40px;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-dot.green { background: #22c55e; }
        .status-dot.yellow { background: #eab308; }
        .status-dot.red { background: #ef4444; }
        .indicator-label {
            font-size: clamp(11px, 1.2vw, 15px);
            font-weight: 400;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ─── QR Code + Info ─── */
        .info-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(12px, 2vw, 24px);
            margin-top: clamp(16px, 3vh, 40px);
            flex-wrap: wrap;
        }
        .qr-box {
            background: #fff;
            padding: clamp(6px, 1vw, 12px);
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .qr-box canvas, .qr-box img {
            display: block;
            width: clamp(90px, 12vw, 150px);
            height: clamp(90px, 12vw, 150px);
        }
        .info-text {
            text-align: left;
            color: rgba(255,255,255,0.3);
            font-size: clamp(10px, 1vw, 13px);
            line-height: 1.6;
            max-width: 280px;
        }
        .info-text strong {
            color: rgba(255,255,255,0.5);
        }

        /* ─── Footer ─── */
        .inst-footer {
            position: fixed;
            bottom: clamp(8px, 1.5vh, 20px);
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(9px, 0.8vw, 11px);
            color: rgba(255,255,255,0.08);
            letter-spacing: 3px;
            text-transform: uppercase;
            white-space: nowrap;
            z-index: 2;
        }

        /* ─── Video - preenche 100% sem bordas ─── */
        #remoteVideo {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: 20;
            display: none;
            background: #001a33;
        }
        #remoteVideo.showing {
            display: block;
        }

        /* ─── Overlay "AO VIVO" (sem pulse) ─── */
        #connected-overlay {
            position: fixed;
            top: clamp(8px, 1.5vh, 20px);
            right: clamp(12px, 2vw, 24px);
            z-index: 20;
            display: none;
            gap: 8px;
            align-items: center;
        }
        #connected-overlay.showing {
            display: flex;
        }
        #connected-overlay .live-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: clamp(9px, 0.8vw, 11px);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(239,68,68,0.2);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.2);
        }
        #connected-overlay .user-info {
            font-size: clamp(9px, 0.8vw, 11px);
            color: rgba(255,255,255,0.2);
        }

        /* ─── Responsivo ─── */
        @media (max-width: 640px) {
            .info-row { flex-direction: column; gap: 10px; }
            .info-text { text-align: center; max-width: 80vw; }
        }
        @media (min-width: 1920px) {
            .sala-nome-display { font-size: 72px; }
            .status-text-main { font-size: 52px; }
        }
    </style>
</head>
<body>

    <!-- ─── Tela de espera (estática, sem animações) ─── -->
    <div id="waiting">
        <div class="waiting-content">
            <div class="logo-projetor">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/S%C3%ADmbolo_da_UFRB.png/320px-S%C3%ADmbolo_da_UFRB.png"
                     alt="UFRB"
                     onerror="this.style.display='none'">
            </div>

            <div class="sala-tag">{{ instituicao }}</div>
            <div class="sala-nome-display">{{ sala_nome }}</div>

            <div class="status-text-main" id="statusDisplay">Aguardando conexão...</div>

            <div class="indicator">
                <span class="status-dot green" id="statusDot"></span>
                <span class="indicator-label" id="statusLabel">Projetor disponível</span>
            </div>

            <div class="info-row">
                <div class="qr-box" id="qrcode"></div>
                <div class="info-text">
                    <strong>Transmita sua tela</strong><br>
                    Escaneie o QR code para abrir o painel,<br>
                    faça login com seu SIAPE e compartilhe.
                </div>
            </div>
        </div>
    </div>

    <!-- ─── Video ─── -->
    <video id="remoteVideo" autoplay playsinline muted></video>

    <!-- ─── Overlay "AO VIVO" ─── -->
    <div id="connected-overlay">
        <span class="live-badge">&#9679; AO VIVO</span>
        <span class="user-info" id="connectedUser"></span>
    </div>

    <div class="inst-footer">{{ instituicao }} &middot; UFRB</div>

    <script>
    const SALA_ID = '{{ sala_id }}';
    const ICE_CONFIG = {{ ice_servers|safe }};

    // ─── QR Code ───
    try {
        new QRCode(document.getElementById('qrcode'), {
            text: '{{ qr_url|e }}',
            width: 150,
            height: 150,
            colorDark: '#003366',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });
    } catch(e) {
        document.getElementById('qrcode').innerHTML =
            '<p style="color:#888;font-size:11px;">QR</p>';
    }

    // ─── Socket.IO ───
    let socket = io();
    let peerConnection = null;
    let connected = false;
    let iceFailedTimer = null;

    socket.on('connect', () => {
        console.log('[DISPLAY] Conectado');
        socket.emit('join', { sala: SALA_ID, tipo: 'display' });
        setStatusDisplay('disponivel', 'Projetor disponível', 'green');
    });

    socket.on('disconnect', () => {
        console.log('[DISPLAY] Desconectado');
    });

    // ─── Offer recebida ───
    socket.on('offer', async (offer) => {
        console.log('[WEBRTC] Offer recebida');
        setStatusDisplay('conectando', 'Recebendo transmissão...', 'yellow');

        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (iceFailedTimer) {
            clearTimeout(iceFailedTimer);
            iceFailedTimer = null;
        }

        peerConnection = new RTCPeerConnection(ICE_CONFIG);

        peerConnection.ontrack = (event) => {
            console.log('[WEBRTC] Stream recebido!');
            if (iceFailedTimer) {
                clearTimeout(iceFailedTimer);
                iceFailedTimer = null;
            }
            const video = document.getElementById('remoteVideo');
            if (event.streams && event.streams[0]) {
                video.srcObject = event.streams[0];
                video.classList.add('showing');
                document.getElementById('waiting').classList.add('hidden');
                connected = true;
                setStatusDisplay('conectado', 'Transmitindo', 'yellow');
                document.getElementById('connected-overlay').classList.add('showing');
                video.play().catch(e => {
                    console.log('[VIDEO] Play falhou, forçando muted:', e.message);
                    video.muted = true;
                    video.play().catch(e2 => {
                        console.warn('[VIDEO] Play muted também falhou:', e2.message);
                    });
                });
            }
        };

        peerConnection.onicecandidate = (event) => {
            if (event.candidate && socket) {
                socket.emit('ice-candidate', {
                    sala: SALA_ID,
                    candidate: event.candidate
                });
            }
        };

        peerConnection.oniceconnectionstatechange = () => {
            const state = peerConnection.iceConnectionState;
            console.log('[WEBRTC] ICE state:', state);
            if (state === 'connected' || state === 'completed') {
                if (iceFailedTimer) {
                    clearTimeout(iceFailedTimer);
                    iceFailedTimer = null;
                }
            } else if (state === 'failed') {
                console.log('[WEBRTC] ICE falhou');
                setStatusDisplay('erro', 'Falha na conexão', 'red');
            }
        };

        // timeout: se ICE nao conectar em 15s
        iceFailedTimer = setTimeout(() => {
            if (peerConnection && peerConnection.iceConnectionState !== 'connected'
                && peerConnection.iceConnectionState !== 'completed') {
                console.log('[WEBRTC] ICE timeout apos 15s');
                setStatusDisplay('erro', 'Tempo limite de conexão', 'red');
            }
        }, 15000);

        try {
            await peerConnection.setRemoteDescription(
                new RTCSessionDescription(offer.sdp));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', { sala: SALA_ID, sdp: answer });
            console.log('[WEBRTC] Answer enviada');
        } catch(e) {
            console.error('[WEBRTC] Erro offer/answer:', e.message);
            setStatusDisplay('erro', 'Erro na conexão', 'red');
        }
    });

    // ─── ICE candidate ───
    socket.on('ice-candidate', async (candidate) => {
        if (peerConnection) {
            try {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            } catch(e) {
                console.warn('[WEBRTC] addIceCandidate erro:', e.message);
            }
        }
    });

    // ─── Professor desconectou ───
    socket.on('professor-desconectou', () => {
        console.log('[DISPLAY] Professor desconectou');
        if (iceFailedTimer) {
            clearTimeout(iceFailedTimer);
            iceFailedTimer = null;
        }
        const video = document.getElementById('remoteVideo');
        const waitingDiv = document.getElementById('waiting');
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(t => {
                try { t.stop(); } catch(e) {}
            });
            video.srcObject = null;
        }
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        video.classList.remove('showing');
        connected = false;
        if (waitingDiv) {
            waitingDiv.classList.remove('hidden');
        }
        document.getElementById('connected-overlay').classList.remove('showing');
        setStatusDisplay('disponivel', 'Projetor disponível', 'green');
    });

    // ─── Status ───
    function setStatusDisplay(texto, label, cor) {
        const display = document.getElementById('statusDisplay');
        const dot = document.getElementById('statusDot');
        const labelEl = document.getElementById('statusLabel');
        if (display) display.textContent = texto;
        if (dot) {
            dot.className = 'status-dot';
            dot.classList.add(cor === 'green' ? 'green' : cor === 'yellow' ? 'yellow' : 'red');
        }
        if (labelEl) labelEl.textContent = label || texto;
    }

    // ─── Cleanup ───
    window.addEventListener('beforeunload', () => {
        if (iceFailedTimer) clearTimeout(iceFailedTimer);
        if (socket) socket.close();
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        const video = document.getElementById('remoteVideo');
        if (video && video.srcObject) {
            video.srcObject.getTracks().forEach(t => t.stop());
        }
    });
    </script>
</body>
</html>
