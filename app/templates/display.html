<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ sala_nome }} — Projetor</title>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            cursor: none !important;
        }
        *, a, button, input, video, div, span, p, h1, h2, h3, img {
            cursor: none !important;
        }

        /* ─── Waiting Screen - fundo SÓLIDO (sem gradiente, sem flicker no Mali) ─── */
        #waiting {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000d1a;
            z-index: 10;
        }
        #waiting.hidden {
            display: none;
        }

        .waiting-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-projetor {
            margin-bottom: clamp(12px, 2vh, 28px);
        }
        .logo-projetor img {
            width: clamp(48px, 6vw, 80px);
            height: auto;
            filter: brightness(0) invert(1);
            opacity: 0.5;
        }

        .sala-tag {
            font-size: clamp(10px, 1.2vw, 16px);
            color: rgba(255,255,255,0.2);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .sala-nome-display {
            font-size: clamp(28px, 5vw, 64px);
            font-weight: 300;
            color: rgba(255,255,255,0.85);
            letter-spacing: 2px;
            margin-bottom: clamp(16px, 3vh, 40px);
        }

        .status-text-main {
            font-size: clamp(22px, 3.5vw, 48px);
            font-weight: 200;
            color: rgba(255,255,255,0.7);
            letter-spacing: 4px;
        }

        .indicator {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: clamp(12px, 2vh, 28px);
            padding: clamp(6px, 1vh, 10px) clamp(20px, 3vw, 32px);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 40px;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-dot.green { background: #22c55e; }
        .status-dot.yellow { background: #eab308; }
        .status-dot.red { background: #ef4444; }
        .indicator-label {
            font-size: clamp(11px, 1.2vw, 15px);
            font-weight: 400;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ─── QR Code + Info ─── */
        .info-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(12px, 2vw, 24px);
            margin-top: clamp(16px, 3vh, 40px);
            flex-wrap: wrap;
        }
        .qr-box {
            background: #fff;
            padding: clamp(6px, 1vw, 12px);
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .qr-box canvas, .qr-box img {
            display: block;
            width: clamp(90px, 12vw, 150px);
            height: clamp(90px, 12vw, 150px);
        }
        .info-text {
            text-align: left;
            color: rgba(255,255,255,0.3);
            font-size: clamp(10px, 1vw, 13px);
            line-height: 1.6;
            max-width: 280px;
        }
        .info-text strong {
            color: rgba(255,255,255,0.5);
        }

        /* ─── Footer ─── */
        .inst-footer {
            position: fixed;
            bottom: clamp(8px, 1.5vh, 20px);
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(9px, 0.8vw, 11px);
            color: rgba(255,255,255,0.08);
            letter-spacing: 3px;
            text-transform: uppercase;
            white-space: nowrap;
            z-index: 2;
        }

        /* ─── Video - preenche 100% sem bordas ─── */
        #remoteVideo {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: 20;
            display: none;
            background: #001a33;
        }
        #remoteVideo.showing {
            display: block;
        }

        /* ─── Overlay "AO VIVO" (sem pulse) ─── */
        #connected-overlay {
            position: fixed;
            top: clamp(8px, 1.5vh, 20px);
            right: clamp(12px, 2vw, 24px);
            z-index: 20;
            display: none;
            gap: 8px;
            align-items: center;
        }
        #connected-overlay.showing {
            display: flex;
        }
        #connected-overlay .live-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: clamp(9px, 0.8vw, 11px);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(239,68,68,0.2);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.2);
        }
        #connected-overlay .user-info {
            font-size: clamp(9px, 0.8vw, 11px);
            color: rgba(255,255,255,0.2);
        }

        /* ─── Responsivo ─── */
        @media (max-width: 640px) {
            .info-row { flex-direction: column; gap: 10px; }
            .info-text { text-align: center; max-width: 80vw; }
        }
        @media (min-width: 1920px) {
            .sala-nome-display { font-size: 72px; }
            .status-text-main { font-size: 52px; }
        }
    </style>
</head>
<body>

    <!-- ─── Tela de espera (estática, sem animações) ─── -->
    <div id="waiting">
        <div class="waiting-content">
            <div class="logo-projetor">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/S%C3%ADmbolo_da_UFRB.png/320px-S%C3%ADmbolo_da_UFRB.png"
                     alt="UFRB"
                     onerror="this.style.display='none'">
            </div>

            <div class="sala-tag">{{ instituicao }}</div>
            <div class="sala-nome-display">{{ sala_nome }}</div>

            <div class="status-text-main" id="statusDisplay">Aguardando conexão...</div>

            <div class="indicator">
                <span class="status-dot green" id="statusDot"></span>
                <span class="indicator-label" id="statusLabel">Projetor disponível</span>
            </div>

            <div class="info-row">
                <div class="qr-box" id="qrcode"></div>
                <div class="info-text">
                    <strong>Transmita sua tela</strong><br>
                    Escaneie o QR code para abrir o painel,<br>
                    faça login com seu SIAPE e compartilhe.
                </div>
            </div>
        </div>
    </div>

    <!-- ─── Video ─── -->
    <video id="remoteVideo" autoplay playsinline muted></video>

    <!-- ─── Overlay "AO VIVO" ─── -->
    <div id="connected-overlay">
        <span class="live-badge">&#9679; AO VIVO</span>
        <span class="user-info" id="connectedUser"></span>
    </div>

    <div class="inst-footer">{{ instituicao }} &middot; UFRB</div>

    <script>
    const SALA_ID = '{{ sala_id }}';
    const ICE_CONFIG = {{ ice_servers|safe }};
    const HEARTBEAT_INTERVAL = 5000;

    // ─── QR Code ───
    try {
        new QRCode(document.getElementById('qrcode'), {
            text: '{{ qr_url|e }}',
            width: 150,
            height: 150,
            colorDark: '#003366',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });
    } catch(e) {
        document.getElementById('qrcode').innerHTML =
            '<p style="color:#888;font-size:11px;">QR</p>';
    }

    // ─── Socket.IO ───
    let socket = criarSocket();
    let peerConnection = null;
    let heartbeatTimer = null;
    let connected = false;

    function criarSocket() {
        const s = io({
            transports: ['polling', 'websocket'],
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 10000,
            timeout: 10000
        });

        s.on('connect', () => {
            console.log('[SOCKET] Conectado:', s.id);
            s.emit('join', { sala: SALA_ID, tipo: 'display' });
            // NÃO muda status visual no connect — mantém estável
            // O status já foi setado como 'disponivel' no resetarDisplay()
            iniciarHeartbeat();
        });

        s.on('disconnect', () => {
            console.log('[SOCKET] Desconectado');
            // NÃO muda status visual — evitar flicker verde/vermelho
            // Socket reconecta automaticamente, status continua "disponivel"
            pararHeartbeat();
        });

        s.on('connect_error', (err) => {
            console.log('[SOCKET] Erro conexão:', err.message);
            // também silencioso — sem mudança visual
        });

        // ─── Offer recebida (transmissão chegando) ───
        s.on('offer', async (data) => {
            try {
                console.log('[WEBRTC] Offer recebida');
                setStatusDisplay('conectando', 'Recebendo transmissão...', 'yellow');

                limparPeerConnection();

                peerConnection = new RTCPeerConnection(ICE_CONFIG);

                peerConnection.ontrack = (event) => {
                    console.log('[WEBRTC] Stream recebido!');
                    const video = document.getElementById('remoteVideo');
                    video.srcObject = event.streams[0];

                    // Mostra video IMEDIATAMENTE + tenta play com retry
                    video.classList.add('showing');
                    document.getElementById('waiting').classList.add('hidden');
                    connected = true;
                    setStatusDisplay('conectado', 'Transmitindo', 'yellow');
                    document.getElementById('connected-overlay').classList.add('showing');

                    // Tenta play() com retry a cada 500ms (ate 10x)
                    let tentativas = 0;
                    const tentarPlay = () => {
                        video.play().then(() => {
                            console.log('[VIDEO] Reproduzindo (tentativa', tentativas + 1, ')');
                        }).catch(e => {
                            tentativas++;
                            if (tentativas < 10) {
                                console.log('[VIDEO] Tentativa', tentativas, 'falhou:', e.message);
                                setTimeout(tentarPlay, 500);
                            } else {
                                console.log('[VIDEO] Desistiu apos 10 tentativas');
                            }
                        });
                    };
                    tentarPlay();

                    // Monitora se o video realmente comecou a mostrar quadros
                    video.addEventListener('timeupdate', function onTime() {
                        if (video.currentTime > 0) {
                            console.log('[VIDEO] Primeiro frame reproduzido');
                            video.removeEventListener('timeupdate', onTime);
                        }
                    }, { once: true });
                    // timeout: se em 8s nao teve frame, tenta forcar
                    setTimeout(() => {
                        if (video.currentTime === 0 && video.paused === false) {
                            console.log('[VIDEO] Sem frame apos 8s, reiniciando...');
                            video.play().catch(console.warn);
                        }
                    }, 8000);
                };

                peerConnection.onicecandidate = (event) => {
                    if (event.candidate && socket && socket.connected) {
                        socket.emit('ice-candidate', {
                            sala: SALA_ID,
                            candidate: event.candidate
                        });
                    }
                };

                peerConnection.oniceconnectionstatechange = () => {
                    console.log('[WEBRTC] ICE:', peerConnection.iceConnectionState);
                    const state = peerConnection.iceConnectionState;
                    if (state === 'failed') {
                        console.log('[WEBRTC] ICE falhou, resetando...');
                        setTimeout(() => {
                            if (peerConnection &&
                                peerConnection.iceConnectionState === 'failed') {
                                resetarDisplay();
                            }
                        }, 3000);
                    } else if (state === 'connected') {
                        setStatusDisplay(
                            'conectado',
                            'Transmitindo',
                            'yellow'
                        );
                    }
                    // disconnected é TRANSITÓRIO — não muda nada visual
                };

                await peerConnection.setRemoteDescription(
                    new RTCSessionDescription(data.sdp));

                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                socket.emit('answer', {
                    sala: SALA_ID,
                    sdp: peerConnection.localDescription
                });

                console.log('[WEBRTC] Answer enviada');
            } catch(e) {
                console.error('[WEBRTC] Erro offer:', e);
                setStatusDisplay('erro', 'Erro ao receber transmissão', 'red');
                setTimeout(resetarDisplay, 3000);
            }
        });

        // ─── Sessão encerrada ───
        s.on('session-ended', (data) => {
            console.log('[SOCKET] Sessão encerrada');
            resetarDisplay();
        });

        // ─── Sessão ativa ───
        s.on('session-active', (data) => {
            console.log('[SOCKET] Sessão ativa:', data.user);
            document.getElementById('connectedUser').textContent = data.user;
            setStatusDisplay('conectando', data.user + ' conectou', 'yellow');
        });

        // ─── ICE candidate ───
        s.on('ice-candidate', async (data) => {
            if (peerConnection && data.candidate) {
                try {
                    await peerConnection.addIceCandidate(
                        new RTCIceCandidate(data.candidate));
                } catch(e) {}
            }
        });

        return s;
    }

    // ─── Heartbeat ───
    function iniciarHeartbeat() {
        pararHeartbeat();
        heartbeatTimer = setInterval(() => {
            if (socket && socket.connected) {
                socket.emit('heartbeat', { sala: SALA_ID });
            }
        }, HEARTBEAT_INTERVAL);
    }

    function pararHeartbeat() {
        if (heartbeatTimer) {
            clearInterval(heartbeatTimer);
            heartbeatTimer = null;
        }
    }

    // ─── Reset / Limpeza ───
    function resetarDisplay() {
        console.log('[DISPLAY] Resetando...');

        const video = document.getElementById('remoteVideo');
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(t => {
                try { t.stop(); } catch(e) {}
            });
            video.srcObject = null;
        }
        video.classList.remove('showing');

        limparPeerConnection();

        document.getElementById('waiting').classList.remove('hidden');
        document.getElementById('connected-overlay').classList.remove('showing');
        connected = false;
        setStatusDisplay('disponivel', 'Projetor disponível', 'green');

        if (!socket || !socket.connected) {
            socket = criarSocket();
        } else {
            socket.emit('join', { sala: SALA_ID, tipo: 'display' });
        }
    }

    function limparPeerConnection() {
        if (peerConnection) {
            try { peerConnection.close(); } catch(e) {}
            peerConnection = null;
        }
    }

    // ─── Status (sem animação) ───
    function setStatusDisplay(texto, label, cor) {
        const display = document.getElementById('statusDisplay');
        const dot = document.getElementById('statusDot');
        const labelEl = document.getElementById('statusLabel');
        if (display) display.textContent = texto;
        if (dot) {
            dot.className = 'status-dot';
            dot.classList.add(cor === 'green' ? 'green' : cor === 'yellow' ? 'yellow' : 'red');
        }
        if (labelEl) labelEl.textContent = label || texto;
    }

    // ─── Cleanup ───
    window.addEventListener('beforeunload', () => {
        pararHeartbeat();
        if (socket) socket.close();
        limparPeerConnection();
        const video = document.getElementById('remoteVideo');
        if (video && video.srcObject) {
            video.srcObject.getTracks().forEach(t => t.stop());
        }
    });

    console.log('[DISPLAY] Pronto (estático). Sala:', SALA_ID);
    </script>
</body>
</html>
