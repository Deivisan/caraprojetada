name: caraprojetada
description: app android para transmitir tela para projetor via VNC
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^6.0.0
  shared_preferences: ^2.2.0
  http: ^1.2.0
  flutter_background_service: ^5.0.0
  wakelock_plus: ^1.2.0
  sensors_plus: ^4.0.0
  permission_handler: ^11.0.0
  flutter_platform_widgets: ^7.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
