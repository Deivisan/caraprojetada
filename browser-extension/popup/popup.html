<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaraProjetada TabMirror</title>
  <style>
    body {
      width: 320px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      margin: 0;
      padding: 16px;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
    }
    .header h1 { font-size: 18px; margin: 0; color: #4CAF50; }
    .header p { font-size: 12px; color: #888; margin: 5px 0 0; }
    
    .status {
      padding: 12px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 16px;
      text-align: center;
    }
    .status.connected { border-left: 3px solid #4CAF50; }
    .status.disconnected { border-left: 3px solid #f44336; }
    
    .tabs-list { max-height: 250px; overflow-y: auto; margin-bottom: 16px; }
    .tab-item {
      padding: 10px;
      background: #0f3460;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-item:hover { background: #e94560; }
    .tab-item.active { background: #4CAF50; }
    .tab-item-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .tab-item-url { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .btn {
      width: 100%;
      padding: 12px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      margin-top: 8px;
    }
    .btn:disabled { background: #666; cursor: not-allowed; }
    
    .refresh-btn {
      background: #333;
      padding: 6px 12px;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎯 CaraProjetada</h1>
    <p>TabMirror v1.0</p>
  </div>
  
  <div id="status" class="status disconnected">
    <strong>Desconectado</strong>
    <p id="status-detail">Verificando projetor...</p>
  </div>
  
  <button id="refresh-tabs" class="btn refresh-btn">🔄 Atualizar Abas</button>
  
  <div id="tabs-list" class="tabs-list">
    <p style="text-align: center; color: #666;">Carregando abas...</p>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
