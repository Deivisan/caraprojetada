<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="60" cy="60" r="58" fill="#1a1a2e" stroke="#00d4ff" stroke-width="2"/>
  
  <!-- Projector body -->
  <rect x="30" y="25" width="60" height="50" rx="4" fill="#2d2d44" stroke="#00d4ff" stroke-width="2"/>
  
  <!-- Lens -->
  <circle cx="60" cy="50" r="18" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <circle cx="60" cy="50" r="14" fill="#0a0a14" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  
  <!-- Light beams -->
  <path d="M 75 50 L 95 35" stroke="#ff00ff" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  <path d="M 75 50 L 95 50" stroke="#ff00ff" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  <path d="M 75 50 L 95 65" stroke="#ff00ff" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  
  <!-- Control panel lights -->
  <circle cx="40" cy="70" r="3" fill="#00ff00" opacity="0.8"/>
  <circle cx="50" cy="70" r="3" fill="#00ff00" opacity="0.8"/>
  <circle cx="60" cy="70" r="3" fill="#00ff00" opacity="0.8"/>
  <circle cx="70" cy="70" r="3" fill="#00ff00" opacity="0.8"/>
  <circle cx="80" cy="70" r="3" fill="#ff6600" opacity="0.8"/>
  
  <!-- Glow effect -->
  <circle cx="60" cy="50" r="20" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  
  <!-- Text -->
  <text x="60" y="95" font-family="monospace" font-size="10" fill="#00d4ff" text-anchor="middle" font-weight="bold">CaraProjetada</text>
</svg>